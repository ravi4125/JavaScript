<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        font-family: sans-serif;
      }
      .formSection {
        display: grid;
        padding: 20px;
        grid-template-columns: 20% auto;
        gap: 30px;
      }
      .formSection form {
        padding: 15px;
        box-shadow: 0px 0px 10px 2px #ccc;
      }
      .formSection form h3 {
        text-align: center;
        padding-bottom: 15px;
      }

      .inputOuter {
        margin-bottom: 10px;
      }

      .inputOuter label {
        display: block;
        font-size: 14px;
      }

      .inputOuter input {
        width: 100%;
        height: 30px;
      }

      .formSection form button {
        width: 100%;
        border: none;
        background-color: blue;
        color: white;
        padding: 8px 0px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 8px;
      }
      th {
        background-color: #f2f2f2;
      }
      button {
        background-color: red;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
      }

      .error {
        font-size: 12px;
        margin-top: 5px;
        color: red;
      }
    </style>
  </head>
  <body>
    <section class="formSection">
      <form action="">
        <h3>Enquire Now</h3>

        <div class="error"></div>
        <div class="inputOuter">
          <label for="">Name</label>
          <input type="text" name="name" id="" />
        </div>
        <div class="inputOuter">
          <label for="">Email</label>
          <input type="email" name="email" id="" />
        </div>
        <div class="inputOuter">
          <label for="">Phone</label>
          <input type="text" name="phone" id="" />
        </div>
        <button>Save</button>
      </form>
      <div>
        <table border="1" cellspacing="0" cellpadding="10">
          <thead>
            <tr>
              <th>Sr. No.</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </body>
  <script>
    let formElem = document.querySelector(".formSection form");
    // console.log(formElem);

    let errorDiv = document.querySelector(".error");

    let userData = [];

    formElem.addEventListener("submit", (event) => {
      // console.log(event.target); // Form Tag
      event.preventDefault(); // Page Refresh Stop

      let userName = event.target.name.value;
      let userEmail = event.target.email.value;
      let userPhone = event.target.phone.value;

      let userObject = {
        userName,
        userEmail,
        userPhone,
      };

      let checkMyEmail = userData.find((item) => item.userEmail == userEmail);

      if (checkMyEmail) {
        // alert("Email Already Exist.....");
        errorDiv.innerHTML = "Email Already Exist....";

        setTimeout(() => {
          errorDiv.innerHTML = "";
        }, 2000);
      } else {
        userData.push(userObject);
        storeDataInTable();
      }

      // userData.push(userObject);

      event.target.reset();
    });

    let tableBody = document.querySelector("#tableBody");
    let storeDataInTable = () => {
      let tableRow = ``;
      userData.forEach((items, index) => {
        // console.log(items);

        tableRow += ` <tr>
              <td>${index + 1}</td>
              <td>${items.userName}</td>
              <td>${items.userEmail}</td>
              <td>${items.userPhone}</td>
              <td><button ${index}>Delete</button></td>
            </tr>`;

        console.log(tableRow);
      });
      tableBody.innerHTML = tableRow;
    };

    tableBody.addEventListener("click", (e) => {
      // console.log(e.target.tagName);
      if (e.target.tagName == "BUTTON") {
        if (confirm("Are You sure want to Delete ? ")) {
          let delID = e.target.getAttribute("date-id");
          userData.splice(delID, 1);
          storeDataInTable();
        }
      }
    });
  </script>
</html>
