<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        box-sizing: border-box;
        text-decoration: none;
        list-style: none;
      }
      header {
        display: flex;
        padding: 0px 50px;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0px 2px 10px 0px #ccc;
      }
      header nav ul {
        display: flex;
        gap: 30px;
      }
      header nav ul li a {
        color: #000;
        font-weight: bold;
        font-size: 15px;
        text-transform: uppercase;
      }
      .mIcon {
        display: none;
        cursor: pointer;
      }

      @media only screen and (min-width: 200px) and (max-width: 575px) {
        header nav {
          position: fixed;
          top: 0px;
          background-color: #ccc;
          width: 80%;
          padding: 10px;
          height: 100vh;
          left: -100%;
          transition: 0.5s;
        }
        header nav ul {
          flex-direction: column;
        }
        .mIcon {
          display: block;
          cursor: pointer;
        }
        .showMenu {
          left: 0px !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <figure>
        <img
          width="200"
          src="https://i.pinimg.com/736x/b3/c5/4c/b3c54cc858f5b080619737f832c62208.jpg"
          alt=""
        />
      </figure>

      <i class="fa-solid fa-bars mIcon"></i>

      <nav>
        <ul>
          <li><a href="">Home</a></li>
          <li><a href="">About</a></li>
          <li><a href="">Course</a></li>
          <li><a href="">Gallery</a></li>
          <li><a href="">Contact Us</a></li>
        </ul>
      </nav>
    </header>
  </body>
  <script>
    let mIcon = document.querySelector(".mIcon");
    let navElem = document.querySelector("nav");

    mIcon.addEventListener("click", () => {
      mIcon.classList.toggle("fa-bars");
      mIcon.classList.toggle("fa-xmark");
      navElem.classList.toggle("showMenu");
    });
  </script>
</html>
